changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: Security
      labels:
        - security
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
    - title: Documentation
      labels:
        - documentation
    - title: CI/CD
      labels:
        - ci
    - title: Dependencies
      labels:
        - dependencies
    - title: Other Changes
      labels:
        - "*"
