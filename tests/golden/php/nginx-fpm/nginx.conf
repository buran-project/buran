# The reference wiring frameworks are written against: classic nginx +
# php-fpm. This file is part of the golden contract — every quirk here is a
# deliberate expectation, not an accident.

# Dynamic / CGI-like mode: *.php executed, PATH_INFO split, everything else
# served by nginx itself (static 404s, directory redirects).
server {
    listen 8080;
    root /www;
    index index.php;

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        # try_files re-evaluates $fastcgi_path_info — capture it first
        # (the canonical snippet, e.g. Symfony/Debian docs).
        set $path_info $fastcgi_path_info;
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_pass fpm:9000;
    }
}

# Front-controller mode: existing files as-is, everything else into
# /index.php with the original URI preserved.
server {
    listen 8081;
    root /www;
    index index.php;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass fpm:9000;
    }
}
