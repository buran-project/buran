# Reference stack for regenerating the golden files. PHP version pinned to
# the one the goldens are captured with (see ../README note in regenerate.sh).
services:
  fpm:
    image: php:8.4-fpm-trixie
    volumes:
      - ../www:/www:ro
      - ./zz-golden.conf:/usr/local/etc/php-fpm.d/zz-golden.conf:ro

  nginx:
    image: nginx:stable
    depends_on:
      - fpm
    ports:
      - "18081:8080"
      - "18082:8081"
    volumes:
      - ../www:/www:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
